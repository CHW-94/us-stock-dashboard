<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미국 주식 분석 대시보드 - Tiingo API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }
        h1 { color: #1a202c; font-size: 2.8em; margin-bottom: 10px; font-weight: 700; }
        .subtitle { color: #718096; font-size: 1.1em; font-weight: 500; }
        .search-section {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
        }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        #stockInput {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            text-transform: uppercase;
        }
        #stockInput:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1); }
        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }
        .quick-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .quick-btn { padding: 12px 24px; background: white; border: 2px solid #e5e7eb; color: #374151; }
        .quick-btn:hover { background: #667eea; border-color: #667eea; color: white; }
        .api-info {
            background: #fff3e0;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid #ff9800;
        }
        .api-info input { width: 55%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin-right: 5px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 {
            color: #1a202c;
            margin-bottom: 24px;
            font-size: 1.3em;
            font-weight: 700;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 16px;
        }
        .price-display { font-size: 3.5em; font-weight: 800; color: #667eea; margin: 20px 0; }
        .change {
            font-size: 1.3em;
            margin: 10px 0;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 10px;
            display: inline-block;
        }
        .positive { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .negative { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 18px;
            border-radius: 10px;
            background: #f8f9fa;
            margin-bottom: 8px;
        }
        .info-row:hover { background: #e9ecef; transform: translateX(5px); }
        .info-label { color: #6b7280; font-weight: 600; }
        .info-value { color: #1a202c; font-weight: 700; }
        .loading { text-align: center; padding: 40px; color: #666; font-size: 1.2em; }
        .error { background: #ffebee; color: #c62828; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .simulator-section {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            margin-top: 30px;
        }
        .simulator-section h2 { color: #1a202c; margin-bottom: 20px; font-size: 1.8em; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-grid label { display: block; color: #666; font-weight: 600; margin-bottom: 8px; }
        .input-grid input, .input-grid select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #667eea; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        tr:hover { background: #f8f9fa; }
        @media (max-width: 768px) {
            .dashboard, .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 미국 주식 분석 대시보드</h1>
            <p class="subtitle">Powered by Tiingo API - 실시간 데이터 & 기술적 분석</p>
        </header>

        <div class="search-section">
            <h3>주식 검색</h3>
            <div class="search-box">
                <input type="text" id="stockInput" placeholder="티커 입력 (예: AAPL, TSLA, NVDA)" />
                <button onclick="searchStock()">검색</button>
            </div>
            <p style="margin-bottom: 15px; color: #666;">인기 종목:</p>
            <div class="quick-buttons">
                <button class="quick-btn" onclick="quickSearch('AAPL')">🍎 Apple</button>
                <button class="quick-btn" onclick="quickSearch('TSLA')">🚗 Tesla</button>
                <button class="quick-btn" onclick="quickSearch('NVDA')">💻 NVIDIA</button>
                <button class="quick-btn" onclick="quickSearch('MSFT')">🪟 Microsoft</button>
                <button class="quick-btn" onclick="quickSearch('GOOGL')">🔍 Google</button>
                <button class="quick-btn" onclick="quickSearch('AMZN')">📦 Amazon</button>
            </div>

            <div class="api-info">
                <strong>🚀 Tiingo API 토큰</strong>
                <br><a href="https://www.tiingo.com/account/api/token" target="_blank" style="color: #1e88e5;">Tiingo.com</a>에서 무료 계정 생성 → API 토큰 발급
                <br><small>✅ 무료: 월 50,000 호출 | 실시간 시세 + 과거 데이터 + 재무지표</small>
                <div style="margin-top: 10px;">
                    <input type="text" id="tiingoApiKeyInput" placeholder="Tiingo API 토큰 입력" />
                    <button onclick="saveTiingoApiKey()">저장</button>
                    <button onclick="testTiingoApiKey()" style="background: #ff9800;">테스트</button>
                </div>
                <div id="tiingoApiKeyStatus" style="margin-top: 5px; font-size: 0.9em;"></div>
            </div>
        </div>

        <div id="content">
            <div class="loading">위의 인기 종목을 클릭하거나 티커를 입력하여 주식 정보를 확인하세요</div>
        </div>
    </div>

    <script>
        let currentStock = null;
        let TIINGO_API_KEY = localStorage.getItem('tiingo_api_key') || '';

        function saveTiingoApiKey() {
            const apiKey = document.getElementById('tiingoApiKeyInput').value.trim();
            if (!apiKey) {
                document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #f44336;">❌ API 토큰을 입력해주세요</span>';
                return;
            }
            TIINGO_API_KEY = apiKey;
            localStorage.setItem('tiingo_api_key', apiKey);
            document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #4caf50;">✅ API 토큰이 저장되었습니다</span>';
        }

        async function testTiingoApiKey() {
            const apiKey = document.getElementById('tiingoApiKeyInput').value.trim() || TIINGO_API_KEY;
            if (!apiKey) {
                document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #f44336;">❌ API 토큰을 먼저 입력해주세요</span>';
                return;
            }

            document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #ff9800;">🔄 API 토큰 테스트 중...</span>';

            try {
                const response = await fetch(`https://api.tiingo.com/tiingo/daily/aapl/prices?token=${apiKey}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                if (data && data.length > 0 && data[0].close) {
                    TIINGO_API_KEY = apiKey;
                    localStorage.setItem('tiingo_api_key', apiKey);
                    document.getElementById('tiingoApiKeyStatus').innerHTML = `<span style="color: #4caf50;">✅ API 토큰 유효! (AAPL: $${data[0].close.toFixed(2)})</span>`;
                } else {
                    document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #f44336;">❌ API 토큰이 유효하지 않습니다</span>';
                }
            } catch (error) {
                document.getElementById('tiingoApiKeyStatus').innerHTML = `<span style="color: #f44336;">❌ 연결 오류: ${error.message}</span>`;
            }
        }

        window.onload = function() {
            if (TIINGO_API_KEY) {
                document.getElementById('tiingoApiKeyInput').value = TIINGO_API_KEY;
                document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #4caf50;">✅ Tiingo API 토큰이 로드되었습니다</span>';
            } else {
                document.getElementById('tiingoApiKeyStatus').innerHTML = '<span style="color: #ff9800;">⚠️ API 토큰을 입력해주세요</span>';
            }
        };

        async function searchStock() {
            const symbol = document.getElementById('stockInput').value.trim().toUpperCase();
            if (!symbol) {
                alert('티커 심볼을 입력해주세요');
                return;
            }
            if (!TIINGO_API_KEY) {
                alert('먼저 Tiingo API 토큰을 입력하고 저장해주세요');
                return;
            }
            await fetchStockData(symbol);
        }

        function quickSearch(symbol) {
            document.getElementById('stockInput').value = symbol;
            if (!TIINGO_API_KEY) {
                alert('먼저 Tiingo API 토큰을 입력하고 저장해주세요');
                return;
            }
            fetchStockData(symbol);
        }

        document.getElementById('stockInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchStock();
        });

        async function fetchStockData(symbol) {
            document.getElementById('content').innerHTML = '<div class="loading">📡 데이터를 불러오는 중...</div>';

            try {
                console.log(`📊 Tiingo API 요청: ${symbol}`);

                // 1. 메타 데이터 (종목 정보)
                const metaUrl = `https://api.tiingo.com/tiingo/daily/${symbol}?token=${TIINGO_API_KEY}`;
                const metaResponse = await fetch(metaUrl);
                if (!metaResponse.ok) throw new Error(`종목을 찾을 수 없습니다: ${symbol}`);

                const metaData = await metaResponse.json();

                // 2. 과거 60일 가격 데이터
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(Date.now() - 60 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];

                const pricesUrl = `https://api.tiingo.com/tiingo/daily/${symbol}/prices?startDate=${startDate}&endDate=${endDate}&token=${TIINGO_API_KEY}`;
                const pricesResponse = await fetch(pricesUrl);
                if (!pricesResponse.ok) throw new Error('과거 가격 데이터를 가져올 수 없습니다');

                const pricesData = await pricesResponse.json();

                if (!pricesData || pricesData.length === 0) {
                    throw new Error('가격 데이터가 없습니다');
                }

                // 3. 재무 지표 데이터 (Fundamentals API)
                let fundamentals = { per: null, roe: null, pbr: null };
                try {
                    const fundamentalsUrl = `https://api.tiingo.com/tiingo/fundamentals/${symbol}/daily?token=${TIINGO_API_KEY}`;
                    const fundamentalsResponse = await fetch(fundamentalsUrl);
                    if (fundamentalsResponse.ok) {
                        const fundamentalsData = await fundamentalsResponse.json();
                        if (fundamentalsData && fundamentalsData.length > 0) {
                            const latestFundamentals = fundamentalsData[0];
                            fundamentals.per = latestFundamentals.peRatio || null;
                            fundamentals.roe = latestFundamentals.returnOnEquity || null;
                            fundamentals.pbr = latestFundamentals.pbRatio || null;
                        }
                    }
                } catch (error) {
                    console.warn('재무지표를 가져올 수 없습니다:', error);
                    // 재무지표 없어도 계속 진행
                }

                // 데이터 파싱
                const latest = pricesData[pricesData.length - 1];
                const previous = pricesData.length > 1 ? pricesData[pricesData.length - 2] : latest;

                const historicalPrices = pricesData.map(d => d.close);

                const stockData = {
                    symbol: symbol,
                    name: metaData.name || symbol,
                    description: metaData.description || '',
                    exchange: metaData.exchangeCode || 'N/A',
                    price: latest.close,
                    open: latest.open,
                    high: latest.high,
                    low: latest.low,
                    previousClose: previous.close,
                    change: latest.close - previous.close,
                    changePercent: ((latest.close - previous.close) / previous.close) * 100,
                    volume: latest.volume,
                    historicalPrices: historicalPrices,
                    week52High: Math.max(...historicalPrices),
                    week52Low: Math.min(...historicalPrices),
                    per: fundamentals.per,
                    roe: fundamentals.roe,
                    pbr: fundamentals.pbr
                };

                currentStock = stockData;
                displayStockData(stockData);

            } catch (error) {
                console.error('오류:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>❌ 오류 발생</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px;">
                            <strong>해결 방법:</strong><br>
                            1. 올바른 티커 심볼인지 확인 (예: AAPL, TSLA)<br>
                            2. Tiingo API 토큰이 유효한지 확인<br>
                            3. 잠시 후 다시 시도
                        </p>
                        <button onclick="searchStock()" style="margin-top: 15px;">🔄 다시 시도</button>
                    </div>
                `;
            }
        }

        function displayStockData(data) {
            const changeClass = data.change >= 0 ? 'positive' : 'negative';
            const changeSymbol = data.change >= 0 ? '▲' : '▼';

            const html = `
                <div class="dashboard">
                    <div class="card">
                        <h3>${data.name} (${data.symbol})</h3>
                        <div class="price-display">$${data.price.toFixed(2)}</div>
                        <div class="change ${changeClass}">
                            ${changeSymbol} $${Math.abs(data.change).toFixed(2)}
                            (${data.changePercent.toFixed(2)}%)
                        </div>
                        <p style="color: #666; margin-top: 10px;">${data.exchange}</p>
                    </div>

                    <div class="card">
                        <h3>거래 정보</h3>
                        <div class="info-row">
                            <span class="info-label">시가</span>
                            <span class="info-value">$${data.open.toFixed(2)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">고가</span>
                            <span class="info-value">$${data.high.toFixed(2)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">저가</span>
                            <span class="info-value">$${data.low.toFixed(2)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">전일 종가</span>
                            <span class="info-value">$${data.previousClose.toFixed(2)}</span>
                        </div>
                    </div>

                    <div class="card">
                        <h3>가격 분석</h3>
                        <div class="info-row">
                            <span class="info-label">시가 대비</span>
                            <span class="info-value" style="color: ${data.price >= data.open ? '#4caf50' : '#f44336'}">
                                ${data.price >= data.open ? '+' : ''}${(((data.price - data.open) / data.open) * 100).toFixed(2)}%
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">52주 최고가</span>
                            <span class="info-value">$${data.week52High.toFixed(2)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">52주 최저가</span>
                            <span class="info-value">$${data.week52Low.toFixed(2)}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">52주 범위 내 위치</span>
                            <span class="info-value">
                                ${(((data.price - data.week52Low) / (data.week52High - data.week52Low)) * 100).toFixed(1)}%
                            </span>
                        </div>
                    </div>
                </div>

                <div class="simulator-section">
                    <h2>💰 분할 매수/매도 시뮬레이터</h2>
                    <p style="color: #666; margin-bottom: 20px;">
                        "지하실 밑의 땅굴" 대응형 안전 마진 전략
                    </p>

                    <div class="input-grid">
                        <div>
                            <label>💵 가용 현금 (USD)</label>
                            <input type="number" id="availableCash" value="10000" min="100" step="100" />
                        </div>
                        <div>
                            <label>📊 분할 횟수</label>
                            <select id="splitCount">
                                <option value="3">3회 분할</option>
                                <option value="4">4회 분할</option>
                                <option value="5" selected>5회 분할 (권장)</option>
                                <option value="6">6회 분할</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="calculateBuyStrategy('${data.symbol}', ${data.price})"
                            style="width: 100%; padding: 16px; font-size: 18px; background: #4caf50;">
                        🎯 분할 매수 전략 시뮬레이션
                    </button>

                    <div id="buySimulation" style="margin-top: 20px;"></div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        function calculateIndicatorScore(rsi, mdd, volatility, per, roe) {
            const scores = {
                rsi: 0,
                mdd: 0,
                volatility: 0,
                fundamental: 0
            };

            // RSI 점수 (0-25점) - 낮을수록 과매도 = 높은 점수
            if (rsi <= 15) scores.rsi = 25;
            else if (rsi <= 20) scores.rsi = 22;
            else if (rsi <= 25) scores.rsi = 18;
            else if (rsi <= 30) scores.rsi = 14;
            else if (rsi <= 35) scores.rsi = 10;
            else if (rsi <= 40) scores.rsi = 5;

            // MDD 점수 (0-25점) - 클수록 많이 하락 = 높은 점수
            if (mdd >= 25) scores.mdd = 25;
            else if (mdd >= 20) scores.mdd = 22;
            else if (mdd >= 15) scores.mdd = 18;
            else if (mdd >= 10) scores.mdd = 14;
            else if (mdd >= 7) scores.mdd = 10;
            else if (mdd >= 5) scores.mdd = 5;

            // 변동성 점수 (0-25점) - 클수록 불안정 = 높은 점수
            if (volatility >= 4.0) scores.volatility = 25;
            else if (volatility >= 3.0) scores.volatility = 20;
            else if (volatility >= 2.5) scores.volatility = 15;
            else if (volatility >= 2.0) scores.volatility = 10;
            else if (volatility >= 1.5) scores.volatility = 5;

            // 재무지표 점수 (0-25점) - 저평가 + 고수익성 = 높은 점수
            if (per !== null && per > 0) {
                // PER 점수 (0-15점)
                if (per < 10) scores.fundamental += 15;
                else if (per < 15) scores.fundamental += 12;
                else if (per < 20) scores.fundamental += 8;
                else if (per < 25) scores.fundamental += 5;
            }
            if (roe !== null && roe > 0) {
                // ROE 점수 (0-10점)
                if (roe >= 20) scores.fundamental += 10;
                else if (roe >= 15) scores.fundamental += 7;
                else if (roe >= 10) scores.fundamental += 4;
            }

            const total = scores.rsi + scores.mdd + scores.volatility + scores.fundamental;
            return { scores, total };
        }

        function determineEntryStage(scoreData, splitCount) {
            const total = scoreData.total;

            if (splitCount === 5) {
                if (total >= 75) return 5;      // 5차 (최종) - 극단적 기회
                else if (total >= 60) return 4; // 4차 (물타기)
                else if (total >= 45) return 3; // 3차 (추가)
                else if (total >= 30) return 2; // 2차 (진입)
                else if (total >= 15) return 1; // 1차 (정찰대)
                else return 0;                   // 관찰 중
            } else if (splitCount === 3) {
                if (total >= 65) return 3;
                else if (total >= 40) return 2;
                else if (total >= 20) return 1;
                else return 0;
            } else if (splitCount === 4) {
                if (total >= 70) return 4;
                else if (total >= 55) return 3;
                else if (total >= 35) return 2;
                else if (total >= 18) return 1;
                else return 0;
            } else if (splitCount === 6) {
                if (total >= 80) return 6;
                else if (total >= 68) return 5;
                else if (total >= 56) return 4;
                else if (total >= 42) return 3;
                else if (total >= 28) return 2;
                else if (total >= 14) return 1;
                else return 0;
            }
            return 0;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;

            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                const change = prices[i] - prices[i - 1];
                if (change > 0) gains += change;
                else losses += Math.abs(change);
            }

            const avgGain = gains / period;
            const avgLoss = losses / period;
            if (avgLoss === 0) return 100;

            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        function calculateMA(prices, period) {
            if (prices.length < period) period = prices.length;
            const recentPrices = prices.slice(-period);
            return recentPrices.reduce((a, b) => a + b, 0) / recentPrices.length;
        }

        function calculateMDD(prices) {
            let maxPrice = prices[0];
            let maxDrawdown = 0;

            for (let i = 1; i < prices.length; i++) {
                if (prices[i] > maxPrice) maxPrice = prices[i];
                const drawdown = ((maxPrice - prices[i]) / maxPrice) * 100;
                if (drawdown > maxDrawdown) maxDrawdown = drawdown;
            }

            return maxDrawdown;
        }

        function calculateVolatility(prices) {
            if (prices.length < 2) return 0;

            const returns = [];
            for (let i = 1; i < prices.length; i++) {
                returns.push((prices[i] - prices[i - 1]) / prices[i - 1] * 100);
            }

            const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
            const variance = returns.reduce((sum, r) => sum + Math.pow(r - mean, 2), 0) / returns.length;
            return Math.sqrt(variance);
        }

        async function calculateBuyStrategy(symbol, currentPrice) {
            const availableCash = parseFloat(document.getElementById('availableCash').value);
            const splitCount = parseInt(document.getElementById('splitCount').value);

            if (!availableCash || availableCash < 100) {
                alert('가용 현금을 100 USD 이상 입력해주세요');
                return;
            }

            if (!currentStock || !currentStock.historicalPrices || currentStock.historicalPrices.length < 20) {
                alert('기술적 지표 계산을 위한 충분한 데이터가 없습니다');
                return;
            }

            const prices = currentStock.historicalPrices;
            const rsi = calculateRSI(prices);
            const mdd = calculateMDD(prices);
            const volatility = calculateVolatility(prices);

            const weightTemplates = {
                3: [0.25, 0.35, 0.40],
                4: [0.15, 0.20, 0.30, 0.35],
                5: [0.10, 0.15, 0.20, 0.25, 0.30],
                6: [0.08, 0.12, 0.15, 0.18, 0.22, 0.25]
            };

            const weights = weightTemplates[splitCount];
            const buyPoints = [];

            if (splitCount === 5) {
                buyPoints.push(
                    { stage: '1차 (정찰대)', trigger: 'RSI 35 부근', targetPrice: currentPrice * 0.98, weight: weights[0] },
                    { stage: '2차 (진입)', trigger: 'RSI 30 진입', targetPrice: currentPrice * 0.95, weight: weights[1] },
                    { stage: '3차 (추가)', trigger: '전저점 부근', targetPrice: currentPrice * 0.92, weight: weights[2] },
                    { stage: '4차 (물타기)', trigger: '지하실 땅굴', targetPrice: currentPrice * 0.88, weight: weights[3] },
                    { stage: '5차 (최종)', trigger: '패닉 셀', targetPrice: currentPrice * 0.82, weight: weights[4] }
                );
            } else if (splitCount === 3) {
                buyPoints.push(
                    { stage: '1차 (정찰대)', trigger: 'RSI 35 부근', targetPrice: currentPrice * 0.97, weight: weights[0] },
                    { stage: '2차 (진입)', trigger: 'RSI 30 또는 -5%', targetPrice: currentPrice * 0.95, weight: weights[1] },
                    { stage: '3차 (최종)', trigger: 'RSI 25 또는 -10%', targetPrice: currentPrice * 0.90, weight: weights[2] }
                );
            } else if (splitCount === 4) {
                buyPoints.push(
                    { stage: '1차 (정찰대)', trigger: 'RSI 35 부근', targetPrice: currentPrice * 0.97, weight: weights[0] },
                    { stage: '2차 (진입)', trigger: 'RSI 30 진입', targetPrice: currentPrice * 0.95, weight: weights[1] },
                    { stage: '3차 (추가)', trigger: '전저점 -7%', targetPrice: currentPrice * 0.93, weight: weights[2] },
                    { stage: '4차 (최종)', trigger: 'RSI 20 또는 -12%', targetPrice: currentPrice * 0.88, weight: weights[3] }
                );
            } else if (splitCount === 6) {
                buyPoints.push(
                    { stage: '1차 (정찰대)', trigger: 'RSI 35 부근', targetPrice: currentPrice * 0.98, weight: weights[0] },
                    { stage: '2차 (진입)', trigger: 'RSI 32 진입', targetPrice: currentPrice * 0.96, weight: weights[1] },
                    { stage: '3차 (추가)', trigger: 'RSI 30 진입', targetPrice: currentPrice * 0.93, weight: weights[2] },
                    { stage: '4차 (물타기)', trigger: '전저점 부근', targetPrice: currentPrice * 0.90, weight: weights[3] },
                    { stage: '5차 (심화)', trigger: '지하실 땅굴', targetPrice: currentPrice * 0.86, weight: weights[4] },
                    { stage: '6차 (최종)', trigger: '패닉 셀', targetPrice: currentPrice * 0.80, weight: weights[5] }
                );
            }

            let totalInvested = 0;
            let totalShares = 0;
            const buySteps = buyPoints.map(point => {
                const amount = availableCash * point.weight;
                const shares = amount / point.targetPrice;
                totalInvested += amount;
                totalShares += shares;
                return { ...point, amount, shares };
            });

            const avgPrice = totalInvested / totalShares;

            // 복합 지표 점수 계산
            const scoreData = calculateIndicatorScore(
                rsi,
                mdd,
                volatility,
                currentStock.per,
                currentStock.roe
            );

            // 진입 단계 판단
            const stageNumber = determineEntryStage(scoreData, splitCount);

            let currentStage = stageNumber === 0 ? '가격 관찰 중 (조정 대기)' : `${stageNumber}차 매수 구간`;
            let urgency = stageNumber >= splitCount - 1 ? 'urgent' : stageNumber >= 2 ? 'medium' : 'low';
            const urgencyColors = { urgent: '#f44336', high: '#ff9800', medium: '#ffc107', low: '#8bc34a', wait: '#9e9e9e' };

            let html = `
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px; border-radius: 15px; color: white; margin: 20px 0;">
                    <h3 style="margin-bottom: 15px; font-size: 1.5em;">📊 ${splitCount}회 분할 매수 시뮬레이션</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px;">
                        <div style="background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; text-align: center;">
                            <div style="font-size: 0.9em; margin-bottom: 5px;">총 투자금</div>
                            <div style="font-size: 1.5em; font-weight: 700;">$${totalInvested.toFixed(2)}</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; text-align: center;">
                            <div style="font-size: 0.9em; margin-bottom: 5px;">예상 평단가</div>
                            <div style="font-size: 1.5em; font-weight: 700;">$${avgPrice.toFixed(2)}</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; text-align: center;">
                            <div style="font-size: 0.9em; margin-bottom: 5px;">총 주식수</div>
                            <div style="font-size: 1.5em; font-weight: 700;">${totalShares.toFixed(2)}주</div>
                        </div>
                    </div>

                    <div style="background: ${urgencyColors[urgency]}; padding: 20px; border-radius: 10px; margin-top: 15px; text-align: center;">
                        <div style="font-size: 1.8em; font-weight: 700; margin-bottom: 10px;">
                            🎯 ${currentStage}
                        </div>
                        <div style="font-size: 1.1em; margin-bottom: 5px;">현재가: $${currentPrice.toFixed(2)}</div>
                        <div style="font-size: 0.95em; opacity: 0.9;">
                            RSI: ${rsi.toFixed(1)} (${scoreData.scores.rsi}점) |
                            MDD: ${mdd.toFixed(1)}% (${scoreData.scores.mdd}점) |
                            변동성: ${volatility.toFixed(2)}% (${scoreData.scores.volatility}점) |
                            재무: ${scoreData.scores.fundamental}점
                        </div>
                        <div style="font-size: 1.1em; margin-top: 8px; font-weight: 700;">
                            📊 총점: ${scoreData.total}점 / 100점
                        </div>
                        <div style="font-size: 0.85em; margin-top: 5px; opacity: 0.85;">
                            ${currentStock.per !== null ? `PER: ${currentStock.per.toFixed(2)}` : 'PER: N/A'} |
                            ${currentStock.roe !== null ? `ROE: ${(currentStock.roe * 100).toFixed(2)}%` : 'ROE: N/A'}
                        </div>
                    </div>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>단계</th>
                            <th>매수 조건</th>
                            <th>목표가</th>
                            <th>비중</th>
                            <th>매수금액</th>
                            <th>매수수량</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            buySteps.forEach((step, index) => {
                const dropPercent = ((currentPrice - step.targetPrice) / currentPrice * 100);
                html += `
                    <tr>
                        <td style="font-weight: 700; color: #667eea;">${step.stage}</td>
                        <td>${step.trigger}<br><small style="color: #999;">(${dropPercent.toFixed(1)}% 하락)</small></td>
                        <td style="font-weight: 700;">$${step.targetPrice.toFixed(2)}</td>
                        <td style="font-weight: 700; color: #4caf50;">${(step.weight * 100).toFixed(0)}%</td>
                        <td style="font-weight: 700; color: #2196f3;">$${step.amount.toFixed(2)}</td>
                        <td style="font-weight: 700;">${step.shares.toFixed(2)}주</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>

                <div style="background: #fff3e0; padding: 20px; border-radius: 10px; margin-top: 20px; border-left: 4px solid #ff9800;">
                    <h4 style="color: #e65100; margin-bottom: 10px;">⚡ 전략 포인트</h4>
                    <ul style="color: #666; line-height: 2;">
                        <li><strong>역피라미드:</strong> 하락할수록 비중 증가</li>
                        <li><strong>안전 마진:</strong> ${splitCount}회 분할로 리스크 분산</li>
                        <li><strong>평단가 효과:</strong> 완전 매수 시 $${avgPrice.toFixed(2)} (현재가 대비 ${((avgPrice-currentPrice)/currentPrice*100).toFixed(1)}%)</li>
                    </ul>
                </div>
            `;

            document.getElementById('buySimulation').innerHTML = html;
        }
    </script>
